name: Auto Generate Post

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 UTC 0시 = 한국시간 오전 9시
  workflow_dispatch: {}     # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 글 자동 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_post.py

      - name: 변경사항 자동 커밋 및 푸시
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "actions@github.com"
          git add _posts scripts/.used_keywords.json
          git diff --cached --quiet || git commit -m "auto: 새 글 자동 생성"
          git push
